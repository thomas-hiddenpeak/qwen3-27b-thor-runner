# Qwen3.5-4B Thor — BF16 配置文件
#
# 用法:
#   qwen3-27b-thor serve --config configs/4b.conf
#   qwen3-27b-thor chat  --config configs/4b.conf
#   qwen3-27b-thor bench --config configs/4b.conf --decode 30
#
# 模型架构 (自动从 config.json 检测):
#   hidden_size=2560, intermediate_size=9216, 32 layers
#   num_attn_heads=16, num_kv_heads=4, head_dim=256
#   linear: nkh=16, kd=128, nv=32, vd=128
#   8 full-attn layers + 24 linear-attn layers
#   tie_word_embeddings=true (lm_head 共享 embed_tokens)
#   权重 ~8.7 GB BF16, 含 MTP

# ============================================================================
# 模型 (Engine)
# ============================================================================

model_dir=/home/rm01/models/dev/llm/Qwen/Qwen3.5-4B

# ============================================================================
# GPU KV Cache (Engine)
# ============================================================================

# 4B 模型仅 ~8.7 GB, 大量空间可用于 KV Cache
# 每 1 GB ≈ 2048 blocks ≈ 32768 tokens (8 full-attn layers)
kv_cache_budget_gb=8.0

# ============================================================================
# SSD 前缀缓存 (Engine — Prefix Caching)
# ============================================================================

cache_enabled=true
cache_dir=/tmp/qwen_kv_cache
max_cache_gb=20
chunk_size=256
cache_ssm_state=true
eviction_policy=lru

# ============================================================================
# MTP 投机解码 (Engine — Multi-Token Prediction)
# ============================================================================

mtp_mode=auto
mtp_kv_blocks=256
mtp_num_drafts=3

# ============================================================================
# HTTP 服务 (Serve)
# ============================================================================

host=0.0.0.0
ollama_port=11434
openai_port=8080
max_conns=128
model_name=qwen3.5-4b
timeout=300
max_output_tokens=32768
