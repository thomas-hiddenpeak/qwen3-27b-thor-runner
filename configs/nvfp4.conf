# Qwen3.5-27B Thor — NVFP4 量化模型配置文件
#
# 用法:
#   qwen3-27b-thor serve --config configs/nvfp4.conf
#   qwen3-27b-thor chat  --config configs/nvfp4.conf
#
# 格式: key=value (每行一个, # 开头为注释)
# CLI 参数始终覆盖配置文件中的同名选项
#
# NVFP4 模型特点:
#   - 权重 ~18.4 GB (vs BF16 ~51 GB), 节省 ~33 GB 统一内存
#   - GEMV 更快 (~88ms vs ~230ms), 带宽需求减半
#   - MTP 最优 draft 数为 2 (d=3 verify 开销过大, d=1 利用不充分)

# ============================================================================
# 模型 (Engine)
# ============================================================================

# NVFP4 模型权重目录 (Kbenkhaled 400 FP4 projections)
model_dir=/home/rm01/models/dev/llm/Kbenkhaled/Qwen3.5-27B-NVFP4

# ============================================================================
# GPU KV Cache (Engine)
# ============================================================================

# GPU KV Cache 内存预算 (GB)
# NVFP4 模型仅占 ~19 GB (含 MTP), 比 BF16 多出 ~33 GB 可用空间
# 可以分配更多给 KV Cache, 支持更长上下文或更多并发
kv_cache_budget_gb=8.0

# ============================================================================
# SSD 前缀缓存 (Engine — Prefix Caching)
# ============================================================================

cache_enabled=true
cache_dir=/tmp/qwen_kv_cache
max_cache_gb=20
chunk_size=256
cache_ssm_state=true
eviction_policy=lru

# ============================================================================
# MTP 投机解码 (Engine — Multi-Token Prediction)
# ============================================================================

# MTP 模式: auto (模型有 MTP 权重则启用)
mtp_mode=auto

# MTP 专用 KV Cache blocks
mtp_kv_blocks=256

# NVFP4 最优 draft 数: 2
# 测试结果 (Kbenkhaled NVFP4, B=1):
#   d=1: Essay 12.2 tok/s, Counting 14.6 tok/s (accept 87%, 1.87 tok/step)
#   d=2: Essay 12.5 tok/s, Counting 16.5 tok/s (accept 78%, 2.56 tok/step)
#   d=3: Essay 11.2 tok/s, Counting 16.1 tok/s (accept 50%, 2.48 tok/step)
# d=2 两项均最优: verify T=3 GEMM 开销合理, 接受率充足
mtp_num_drafts=2

# ============================================================================
# HTTP 服务 (Serve)
# ============================================================================

host=0.0.0.0
ollama_port=11434
openai_port=8080
max_conns=128
model_name=qwen3.5-27b-nvfp4
timeout=300
max_output_tokens=32768
