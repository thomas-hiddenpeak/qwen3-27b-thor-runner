# Qwen3.5-27B Thor — 256K 长上下文 SSD Streaming 测试配置
#
# 目的: 将 GPU KV Cache 预算设为 4 GB (64K tokens),
#        使得超过 64K tokens 的请求触发 SSD block streaming.
#        验证 streaming attention 的正确性、稳定性和性能.
#
# 用法:
#   qwen3-27b-thor serve --config configs/longctx_test.conf
#   # 然后运行: python3 tests/longctx_ssd_stress.py
#
# 也可以一键运行:
#   bash tests/run_longctx_test.sh

# ============================================================================
# 模型 (Engine)
# ============================================================================
model_dir=/home/rm01/models/dev/llm/Qwen/Qwen3.5-27B

# ============================================================================
# GPU KV Cache (Engine) — 故意设小以触发 SSD streaming
# ============================================================================

# 4 GB → 4096 blocks × 16 tokens/block = 65536 tokens (64K)
# 超过 64K tokens 的部分将 FIFO 驱逐到 SSD, 由 streaming attention 处理
kv_cache_budget_gb=4.0

# ============================================================================
# SSD 前缀缓存 + Block Store (Engine)
# ============================================================================

# 启用 SSD 缓存 (prefix cache + block-level SSD store)
cache_enabled=true

# SSD 缓存目录
# 注: /tmp 在 Jetson 上可能是 tmpfs (RAM). 实际部署应改为 NVMe 路径
# 例如: cache_dir=/mnt/nvme/qwen_kv_cache
cache_dir=/tmp/qwen_kv_cache

# SSD 容量: 20 GB
# 256K tokens × 64 KB/token = 16 GB (最坏情况全 SSD), 20 GB 有余量
max_cache_gb=20

# Chunk 大小 (不可超过 256, Jetson SMMU 硬约束)
chunk_size=256

# 缓存 SSM 状态 (完整恢复, 避免重算)
cache_ssm_state=true

# 驱逐策略
eviction_policy=lru

# ============================================================================
# MTP 投机解码 (Engine)
# ============================================================================

# 关闭 MTP: streaming attention 模式下 MTP 自动禁用
# 显式关闭避免 MTP 初始化占用额外内存
mtp_mode=off
mtp_kv_blocks=256
mtp_num_drafts=3

# ============================================================================
# HTTP 服务 (Serve)
# ============================================================================
host=0.0.0.0
ollama_port=11434
openai_port=8080
max_conns=128
model_name=qwen3.5-27b

# 超时: 长上下文 prefill 可能需要数分钟
timeout=900

# 限制输出 token 数 (测试重点是 prefill, 不需要长输出)
max_output_tokens=128
