# Qwen3.5-27B Thor — HTTP 服务配置文件 (仅 serve 配置)
#
# 用法:
#   qwen3-27b-thor serve --serve-config configs/serve.conf
#
# 注意: 推荐使用统一配置文件 configs/config.conf (同时包含 Engine + Serve)
#   qwen3-27b-thor serve --config configs/config.conf
#
# 格式: key=value (每行一个, # 开头为注释)
# CLI 参数可覆盖配置文件中的同名选项

# ============================================================================
# HTTP 服务
# ============================================================================

# 监听地址
host=0.0.0.0

# Ollama 兼容 API 端口 (默认 11434)
ollama_port=11434

# OpenAI 兼容 API 端口 (默认 8080)
openai_port=8080

# 最大并发连接数
max_conns=128

# 模型显示名称 (API 返回的 model 字段)
model_name=qwen3.5-27b

# 请求超时 (秒), 单次生成超时后自动终止
timeout=300

# 单请求最大生成 token 上限 (稳定性护栏)
# 客户端请求的 max_tokens 超过此值时自动截断
max_output_tokens=32768
