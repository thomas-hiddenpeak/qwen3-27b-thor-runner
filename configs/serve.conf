# Qwen3.5-27B Thor — HTTP 服务配置文件
#
# 用法:
#   qwen-thor serve --serve-config configs/serve.conf
#
# 格式: key=value (每行一个, # 开头为注释)
# CLI 参数可覆盖配置文件中的同名选项

# ============================================================================
# HTTP 服务
# ============================================================================

# 监听地址
host=0.0.0.0

# 监听端口 (默认 11434, 与 Ollama 兼容)
port=11434

# 最大并发连接数
max_conns=64

# 模型显示名称 (API 返回的 model 字段)
model_name=qwen3.5-27b

# 请求超时 (秒)
timeout=300
