# Qwen3.5-27B Thor — 统一默认配置文件
#
# 用法:
#   qwen3-27b-thor serve --config configs/config.conf
#   qwen3-27b-thor chat  --config configs/config.conf
#
# 格式: key=value (每行一个, # 开头为注释)
# CLI 参数始终覆盖配置文件中的同名选项
#
# 此文件同时包含引擎(Engine)和服务(Serve)配置
# 也可以用 --serve-config 单独覆盖服务配置

# ============================================================================
# 模型 (Engine)
# ============================================================================

# 模型权重目录 (包含 *.safetensors + config.json + tokenizer.json)
model_dir=/home/rm01/models/dev/llm/Qwen/Qwen3.5-27B

# ============================================================================
# GPU KV Cache (Engine)
# ============================================================================

# GPU KV Cache 内存预算 (GB)
# 控制统一内存中 Paged KV Cache 的大小
# 每 1 GB ≈ 1024 blocks ≈ 16384 tokens (Qwen3.5-27B, 16 full-attn layers)
# 4.0 GB → 65536 tokens (单请求), 8.0 GB → 131072 tokens (推荐多并发)
# Thor 128GB 统一内存, 模型占 ~52 GB, 视觉编码器 ~4 GB, 推荐 8-16 GB
kv_cache_budget_gb=8.0

# ============================================================================
# SSD 前缀缓存 (Engine — Prefix Caching)
# ============================================================================

# 总开关 (true/false)
cache_enabled=false

# SSD 缓存目录 (建议放在 NVMe SSD 上)
cache_dir=/tmp/qwen_kv_cache

# 最大 SSD 缓存容量 (GB)
# Jetson AGX Thor 配备的 SSD 容量通常为 64-128 GB
# 建议预留系统空间, 设为总 SSD 的 50-70%
max_cache_gb=20

# Token chunk 大小 (必须是 block_size=16 的倍数)
# 较大的 chunk 减少元数据开销但降低前缀匹配粒度
# 推荐: 256 (平衡颗粒度和开销)
chunk_size=256

# 是否缓存 SSM/Conv 状态
# Qwen3.5 混合架构 (48 层 DeltaNet): 开启后每个快照额外 ~147 MB
# 关闭时只缓存 KV, 恢复时需要从头重新计算 SSM 状态
# 推荐: true (完整恢复, 避免 SSM 重算)
cache_ssm_state=true

# 驱逐策略 (目前仅支持 lru)
eviction_policy=lru

# ============================================================================
# MTP 投机解码 (Engine — Multi-Token Prediction)
# ============================================================================

# MTP 模式: auto (模型有 MTP 权重则启用), on (强制开), off (强制关)
mtp_mode=auto

# MTP KV Cache blocks 数量 (每 block 16 tokens)
mtp_kv_blocks=256

# ============================================================================
# HTTP 服务 (Serve)
# ============================================================================

# 监听地址
host=0.0.0.0

# Ollama 兼容 API 端口 (默认 11434)
ollama_port=11434

# OpenAI 兼容 API 端口 (默认 8080)
openai_port=8080

# 最大并发连接数
max_conns=64

# 模型显示名称 (API 返回的 model 字段)
model_name=qwen3.5-27b

# 请求超时 (秒), 单次生成超时后自动终止
timeout=300
